<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1>🏮 시티반점 POS</h1>
    <div class="header-controls">
      <label class="switch">
        <input type="checkbox" id="voice-toggle" checked>
        <span class="slider"></span>
      </label>
      <span>음성 알림</span>
      <button class="btn-test" onclick="testSound()">소리 테스트</button>
      <button class="btn-test" onclick="testOrder()">주문 테스트</button>
    </div>
  </div>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="today-orders">0</div>
        <div class="stat-label">오늘 주문</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pending-orders">0</div>
        <div class="stat-label">대기중</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="today-revenue">0</div>
        <div class="stat-label">매출 (원)</div>
      </div>
    </div>

    <div class="orders-section">
      <h2>최근 주문</h2>
      <div id="orders-list" class="orders-list">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>아직 주문이 없습니다</p>
          <small>주문이 실시간으로 표시됩니다</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 주문 확인 팝업 -->
  <div id="order-popup" class="popup-overlay">
    <div class="popup-content">
      <h2>🔔 새 주문</h2>
      <div id="popup-order-info" class="popup-order-info"></div>
      
      <div class="popup-time-select">
        <label>예상 소요시간:</label>
        <select id="prep-time">
          <option value="15">15분</option>
          <option value="20" selected>20분</option>
          <option value="25">25분</option>
          <option value="30">30분</option>
          <option value="35">35분</option>
          <option value="40">40분</option>
          <option value="45">45분</option>
          <option value="50">50분</option>
          <option value="60">60분</option>
        </select>
      </div>

      <div class="popup-actions">
        <button class="btn btn-accept" onclick="acceptOrder()">✓ 수락</button>
        <button class="btn btn-reject" onclick="rejectOrder()">✕ 거절</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
