<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="hamburger-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h1>🏮 시티반점 POS</h1>
    </div>
    <div class="header-controls">
      <div id="business-status" style="padding: 8px 16px; border-radius: 8px; margin-right: 10px; font-weight: 600; font-size: 14px;">
        <span id="status-text">영업중</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="voice-toggle" checked>
        <span class="slider"></span>
      </label>
      <span>음성 알림</span>
      <button class="btn-test" onclick="openBusinessHoursSettings()">⏰ 영업시간 설정</button>
      <button class="btn-test" id="temporary-closed-btn" onclick="toggleTemporaryClosed()">🟢 영업중</button>
      <button class="btn-test" onclick="openBreakTimeSettings()">☕ 브레이크타임 설정</button>
      <button class="btn-test" onclick="testSound()">소리 테스트</button>
      <button class="btn-test" onclick="testOrder()">주문 테스트</button>
    </div>
  </div>

  <!-- 사이드 메뉴 -->
  <div class="side-menu" id="side-menu">
    <div class="side-menu-header">
      <h2>📊 메뉴</h2>
      <button class="close-btn" onclick="toggleMenu()">✕</button>
    </div>
    <nav class="side-menu-nav">
      <a href="/pos" class="menu-item active">
        <span class="menu-icon">🏠</span>
        <span class="menu-text">주문 관리</span>
      </a>
      <a href="/pos/dashboard.html" class="menu-item">
        <span class="menu-icon">📈</span>
        <span class="menu-text">매출 통계</span>
      </a>
      <a href="/pos/dashboard.html?tab=settlement" class="menu-item">
        <span class="menu-icon">💰</span>
        <span class="menu-text">정산 정보</span>
      </a>
      <a href="/pos/dashboard.html?tab=customers" class="menu-item">
        <span class="menu-icon">👥</span>
        <span class="menu-text">고객 분석</span>
      </a>
      <a href="/pos/dashboard.html?tab=regions" class="menu-item">
        <span class="menu-icon">📍</span>
        <span class="menu-text">지역 분석</span>
      </a>
      <div class="menu-divider"></div>
      <a href="/pos/login.html" class="menu-item" onclick="sessionStorage.removeItem('pos-authenticated')">
        <span class="menu-icon">🚪</span>
        <span class="menu-text">로그아웃</span>
      </a>
    </nav>
  </div>
  
  <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="today-orders">0</div>
        <div class="stat-label">오늘 주문</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pending-orders">0</div>
        <div class="stat-label">대기중</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="today-revenue">0</div>
        <div class="stat-label">매출 (원)</div>
      </div>
    </div>

    <div class="orders-section">
      <h2>최근 주문</h2>
      <div id="orders-list" class="orders-list">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>아직 주문이 없습니다</p>
          <small>주문이 실시간으로 표시됩니다</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 주문 확인 팝업 -->
  <div id="order-popup" class="popup-overlay">
    <div class="popup-content">
      <h2>🔔 새 주문</h2>
      <div id="popup-order-info" class="popup-order-info"></div>
      
      <div class="popup-time-select">
        <label>예상 소요시간:</label>
        <select id="prep-time">
          <option value="15">15분</option>
          <option value="20" selected>20분</option>
          <option value="25">25분</option>
          <option value="30">30분</option>
          <option value="35">35분</option>
          <option value="40">40분</option>
          <option value="45">45분</option>
          <option value="50">50분</option>
          <option value="60">60분</option>
        </select>
      </div>

      <div class="popup-actions">
        <button class="btn btn-accept" onclick="acceptOrder()">✓ 수락</button>
        <button class="btn btn-reject" onclick="rejectOrder()">✕ 거절</button>
      </div>
    </div>
  </div>

  <!-- 브레이크타임 설정 팝업 -->
  <div id="break-time-popup" class="popup-overlay" style="display: none;">
    <div class="popup-content" style="max-width: 500px;">
      <h2>☕ 브레이크타임 설정</h2>
      <div style="margin: 20px 0;">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">시작 시간:</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="break-start-hour" min="0" max="23" value="14" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">시</span>
            <input type="number" id="break-start-minute" min="0" max="59" step="30" value="30" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">분</span>
          </div>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">종료 시간:</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="break-end-hour" min="0" max="23" value="15" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">시</span>
            <input type="number" id="break-end-minute" min="0" max="59" step="30" value="30" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">분</span>
          </div>
        </div>
        <div style="padding: 15px; background: #fff3cd; border-radius: 8px; margin-bottom: 20px;">
          <p style="margin: 0; color: #856404; font-weight: 600;">현재 설정: <span id="current-break-time-display">없음</span></p>
          <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">브레이크타임 중에는 주문을 받지 않습니다.</p>
        </div>
      </div>
      <div class="popup-actions">
        <button class="btn btn-accept" onclick="saveBreakTime()">저장</button>
        <button class="btn btn-reject" onclick="clearBreakTime()">해제</button>
        <button class="btn btn-reject" onclick="closeBreakTimeSettings()">취소</button>
      </div>
    </div>
  </div>

  <!-- 영업시간 설정 팝업 -->
  <div id="business-hours-popup" class="popup-overlay" style="display: none;">
    <div class="popup-content" style="max-width: 500px;">
      <h2>⏰ 영업시간 설정</h2>
      <div style="margin: 20px 0;">
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">오픈 시간:</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="open-hour" min="0" max="23" value="9" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">시</span>
            <input type="number" id="open-minute" min="0" max="59" step="30" value="30" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">분</span>
          </div>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px; font-weight: 600;">마감 시간:</label>
          <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="close-hour" min="0" max="23" value="21" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">시</span>
            <input type="number" id="close-minute" min="0" max="59" step="30" value="0" style="width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;">
            <span style="font-size: 18px;">분</span>
          </div>
        </div>
        <div style="padding: 15px; background: #e3f2fd; border-radius: 8px; margin-bottom: 20px;">
          <p style="margin: 0; color: #1976d2; font-weight: 600;">현재 설정: <span id="current-hours-display">-</span></p>
          <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">현재 시간: <span id="current-time-display">-</span></p>
        </div>
      </div>
      <div class="popup-actions">
        <button class="btn btn-accept" onclick="saveBusinessHours()">저장</button>
        <button class="btn btn-reject" onclick="closeBusinessHoursSettings()">취소</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
