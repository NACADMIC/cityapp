<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Restaurant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      color: #d32f2f;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: white;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-order {
      background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
    }

    .btn-pos {
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      box-shadow: 0 4px 15px rgba(25, 118, 210, 0.4);
    }

    .info {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 14px;
    }

    .info p {
      margin: 5px 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 36px;
      }
      
      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏮 시티반점</h1>
    <p class="subtitle">맛있는 중국요리 배달</p>

    <a href="/order-new" class="btn btn-order">
      📱 주문하기
    </a>

    <div class="info">
      <p>📞 영업시간: 11:00 - 21:00</p>
      <p>🚚 배달시간: 약 30-40분</p>
      <p style="margin-top: 15px; color: #999; font-size: 12px;">매장 POS: localhost:3000/pos/login.html</p>
    </div>
  </div>
</body>
</html>
