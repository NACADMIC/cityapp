<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Restaurant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      color: #d32f2f;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 15px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: white;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-order {
      background: linear-gradient(135deg, #d32f2f 0%, #c62828 100%);
      box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
    }

    .btn-pos {
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      box-shadow: 0 4px 15px rgba(25, 118, 210, 0.4);
    }

    .info {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 14px;
    }

    .info p {
      margin: 5px 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 36px;
      }
      
      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏮 시티반점</h1>
    <p class="subtitle">맛있는 중국요리 배달</p>

    <a href="/order-new" class="btn btn-order">
      📱 주문하기
    </a>

    <div class="info">
      <p>📞 영업시간: 11:00 - 21:00</p>
      <p>🚚 배달시간: 약 30-40분</p>
      <p style="margin-top: 15px; color: #999; font-size: 12px;">매장 POS: localhost:3000/pos/login.html</p>
    </div>
  </div>
  
  <!-- 푸터 (가게 정보) -->
  <footer id="store-footer" style="background: rgba(255,255,255,0.1); padding: 20px; margin-top: 20px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.8);">
    <div id="footer-content">로딩 중...</div>
  </footer>

  <script>
    // 푸터 가게 정보 로드
    async function loadFooterInfo() {
      try {
        const res = await fetch('/api/store/info');
        const data = await res.json();
        if (data.success && data.storeInfo) {
          const info = data.storeInfo;
          let footerHTML = `<div style="font-weight: 600; margin-bottom: 8px; color: #fff;">${info.name || '시티반점'}</div>`;
          if (info.owner) {
            footerHTML += `<div>대표자: ${info.owner}</div>`;
          }
          if (info.phone) {
            footerHTML += `<div>📞 ${info.phone}</div>`;
          }
          if (info.address) {
            footerHTML += `<div>📍 ${info.address}</div>`;
          }
          if (info.license) {
            footerHTML += `<div style="margin-top: 8px; opacity: 0.7;">사업자등록번호: ${info.license}</div>`;
          }
          document.getElementById('footer-content').innerHTML = footerHTML;
        }
      } catch (error) {
        console.error('푸터 정보 로드 오류:', error);
        document.getElementById('footer-content').innerHTML = '<div>가게 정보를 불러올 수 없습니다.</div>';
      }
    }
    
    // 가게 정보 업데이트 이벤트 리스너
    window.addEventListener('store-info-updated', loadFooterInfo);
    
    // 페이지 로드 시 푸터 정보 로드
    loadFooterInfo();
  </script>
</body>
</html>
